<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Signal before the open hero scene">
  <defs>
    <radialGradient id="bgBlue" cx="75%" cy="8%" r="55%">
      <stop offset="0" stop-color="#0b1a52" stop-opacity="0.86"/>
      <stop offset="0.42" stop-color="#060917" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#02040a"/>
    </radialGradient>
    <radialGradient id="leftGlow" cx="15%" cy="55%" r="34%">
      <stop offset="0" stop-color="#09266d" stop-opacity="0.44"/>
      <stop offset="1" stop-color="#02040a" stop-opacity="0"/>
