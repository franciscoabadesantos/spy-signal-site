    <linearGradient id="desk" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1a0b03" stop-opacity="0"/>
      <stop offset="0.55" stop-color="#2a1107" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0b0503"/>
    </linearGradient>
    <linearGradient id="blueText" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1e66ff"/>
      <stop offset="1" stop-color="#003cff"/>
    </linearGradient>
    <linearGradient id="screenFace" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#061020"/>
      <stop offset="0.55" stop-color="#030813"/>
      <stop offset="1" stop-color="#01040a"/>
    </linearGradient>
    <linearGradient id="screenGlow" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#061226" stop-opacity="0"/>
      <stop offset="0.63" stop-color="#0b1c55" stop-opacity="0.66"/>
      <stop offset="1" stop-color="#06111e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="chartFill" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#5fff00" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#5fff00" stop-opacity="0"/>
    </linearGradient>
    <filter id="softWhite" x="-20%" y="-20%" width="140%" height="140%">
